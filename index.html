<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Capsule</title>
<meta name="description" content="A social memory game — quests become artifacts, artifacts become a time capsule.">
<meta name="theme-color" content="#0b1220">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<header class="topbar">
  <div class="brand">
    <span class="brand-mark">◈</span>
    <span class="brand-name">Capsule</span>
  </div>
  <div class="level-badge" id="levelBadge">Keeper Lv.1</div>
</header>

<main id="app"></main>

<nav class="tabbar">
  <button class="tab-btn is-active" data-tab="quests"><span class="tab-icon">🗝️</span><span class="tab-label">Quests</span></button>
  <button class="tab-btn" data-tab="chores"><span class="tab-icon">🏕️</span><span class="tab-label">Camp</span></button>
  <button class="tab-btn" data-tab="mafia"><span class="tab-icon">🔪</span><span class="tab-label">Mafia</span></button>
  <button class="tab-btn" data-tab="capsule"><span class="tab-icon">⏳</span><span class="tab-label">Capsule</span></button>
  <button class="tab-btn" data-tab="board"><span class="tab-icon">🌐</span><span class="tab-label">Board</span></button>
  <button class="tab-btn" data-tab="settings"><span class="tab-icon">⚙️</span><span class="tab-label">Trip</span></button>
</nav>

<div class="toast" id="toast"></div>

<script src="app.js"></script>
</body>
</html>
